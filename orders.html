<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Orders - Urban Pulse</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0a;
        --text-light: #ffffff;
        --muted: #999;
        --accent: #ff2cff;
        --card-bg: #111;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text-light);
        line-height: 1.6;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem;
      }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 2rem;
        border-bottom: 1px solid #222;
      }
      .logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.8rem;
        letter-spacing: 2px;
        background: linear-gradient(135deg, #ff2cff, #00f0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        cursor: pointer;
      }
      .muted {
        color: var(--muted);
      }
      .orders-page {
        min-height: 80vh;
        padding: 3rem 0;
      }
      .orders-header {
        text-align: center;
        margin-bottom: 3rem;
      }
      .orders-header h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        letter-spacing: 3px;
        background: linear-gradient(135deg, #ff2cff, #00f0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
      }
      .orders-list {
        max-width: 800px;
        margin: 0 auto;
      }
      .order-card {
        background: #111;
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        border: 1px solid #222;
      }
      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #333;
      }
      .order-id {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 1px;
      }
      .order-status {
        padding: 0.4rem 1rem;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
      }
      .status-processing {
        background: #ff2cff33;
        color: #ff2cff;
      }
      .status-shipped {
        background: #00f0ff33;
        color: #00f0ff;
      }
      .status-delivered {
        background: #38ef7d33;
        color: #38ef7d;
      }
      .order-items {
        margin-bottom: 1rem;
      }
      .order-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
        color: var(--muted);
      }
      .order-total {
        display: flex;
        justify-content: space-between;
        font-size: 1.2rem;
        font-weight: 700;
        padding-top: 1rem;
        border-top: 1px solid #333;
      }
      .order-date {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 1rem;
      }
      .no-orders {
        text-align: center;
        padding: 4rem 2rem;
        color: var(--muted);
      }
      .no-orders h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        color: white;
        margin-bottom: 1rem;
      }
      .btn {
        padding: 12px 26px;
        border: 2px solid var(--accent);
        border-radius: 4px;
        text-decoration: none;
        font-weight: bold;
        background: var(--accent);
        color: black;
        display: inline-block;
        margin-top: 1rem;
        cursor: pointer;
        transition: 0.3s;
      }
      .btn:hover {
        background: #ff5cff;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo" onclick="window.location.href='index.html'">
        URBAN PULSE
      </div>
    </nav>

    <div class="orders-page">
      <div class="container">
        <div class="orders-header">
          <h1>YOUR ORDERS</h1>
          <p class="muted">Track and manage your orders</p>
          <a href="index.html" class="btn" style="margin-top: 1.5rem"
            >Back to Home</a
          >
        </div>

        <div class="orders-list" id="orders-list">
          <!-- Orders will be dynamically loaded here -->
        </div>
      </div>
    </div>

    <script>
      // Sample order data - in a real app, this would come from a backend
      const sampleOrders = [
        {
          id: "UP-2024-001",
          status: "Delivered",
          items: [
            { name: "Neon Nights Hoodie", quantity: 1, price: 89.99 },
            { name: "Urban Pulse × LOKA Tee", quantity: 2, price: 54.99 },
          ],
          total: 199.97,
          created_at: new Date("2024-11-20T14:30:00"),
        },
        {
          id: "UP-2024-002",
          status: "Shipped",
          items: [{ name: "Pulse Bomber Jacket", quantity: 1, price: 149.99 }],
          total: 149.99,
          created_at: new Date("2024-11-25T09:15:00"),
        },
        {
          id: "UP-2024-003",
          status: "Processing",
          items: [
            { name: "Essential Tee Pack", quantity: 1, price: 79.99 },
            { name: "Street Vision Cargo", quantity: 1, price: 94.99 },
          ],
          total: 174.98,
          created_at: new Date("2024-11-27T11:45:00"),
        },
      ];

      function formatDate(date) {
        const options = {
          year: "numeric",
          month: "long",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
          hour12: true,
        };
        return date.toLocaleDateString("en-US", options);
      }

      function renderOrders() {
        const ordersList = document.getElementById("orders-list");

        // Check if there are orders (you can change this to check localStorage or actual data)
        const orders = sampleOrders; // Replace with: JSON.parse(localStorage.getItem('orders') || '[]')

        if (orders.length === 0) {
          ordersList.innerHTML = `
          <div class="no-orders">
            <h2>No Orders Yet</h2>
            <p>You haven't placed any orders yet. Start shopping to see your orders here!</p>
            <a href="index.html" class="btn">Start Shopping</a>
          </div>
        `;
          return;
        }

        let ordersHTML = "";
        orders.forEach((order) => {
          const statusClass = order.status.toLowerCase().replace(" ", "-");

          let itemsHTML = "";
          order.items.forEach((item) => {
            itemsHTML += `
            <div class="order-item">
              <span>${item.name} × ${item.quantity}</span>
              <span>$${(item.price * item.quantity).toFixed(2)}</span>
            </div>
          `;
          });

          ordersHTML += `
          <div class="order-card">
            <div class="order-header">
              <span class="order-id">ORDER #${order.id}</span>
              <span class="order-status status-${statusClass}">${
            order.status
          }</span>
            </div>
            <div class="order-items">
              ${itemsHTML}
            </div>
            <div class="order-total">
              <span>Total</span>
              <span>$${order.total.toFixed(2)}</span>
            </div>
            <div class="order-date">Ordered on ${formatDate(
              order.created_at
            )}</div>
          </div>
        `;
        });

        ordersList.innerHTML = ordersHTML;
      }

      // Load orders when page loads
      renderOrders();
    </script>
  </body>
</html>
